<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Postos</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>

<div class="container">
    <header class="main-header">
        <h1>Controle de Postos</h1>
        <button id="theme-toggle">Modo Escuro</button>
    </header>

    <div class="controls">
        <div class="file-controls">
            <input type="file" id="arquivo" accept=".csv, .txt">
            <button class="secondary-button" id="carregar">Carregar Arquivo</button>
            <button class="btn-success" id="salvar">Salvar Dados</button>
            <button class="btn-pdf" id="exportarPdf">Exportar PDF</button>
            <button id="clear-data-button">Limpar Tudo</button>
        </div>

        <div class="filter-group">
            <label>Filtrar:</label>
            <input type="text" class="short-input" id="filtroNumero" placeholder="Número">
            <input type="text" class="short-input" id="filtroNome" placeholder="Nome">
            <select id="filtroStatus">
                <option value="">Todos</option>
                <option value="ativo">Ativos</option>
                <option value="inativo">Inativos</option>
            </select>
        </div>
    </div>

    <table id="tabelaDados">
        <thead>
            <tr>
                <th>Número</th>
                <th>Posto</th>
                <th>Nome Fantasia</th>
                <th>Descrição</th>
                <th>Latitude</th>
                <th>Longitude</th>
                <th>Raio (m)</th>
                <th>Observações</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td colspan="8" class="loading">Carregando dados dos postos...</td>
            </tr>
        </tbody>
    </table>
</div>

<script src="script.js"></script>
</body>
</html>
